---
ai_context_version: 1.1

# Repo-specific AI context. The normative role contract is
# system/metarepo-role.v1.json.

project:
  name: metarepo
  summary: Versioned Fleet membership, shared contracts, templates, and reusable CI workflows.
  role: shared_asset_registry
  primary_language: mixed
  visibility: internal

heimgewebe:
  axis: [Contracts, Fleet, Templates]
  fleet:
    enabled: true
    authoritative_source: fleet/repos.yml
  wgx:
    profile_expected: true
    guard_smoke_expected: true
    canonical_owner: wgx

interfaces:
  consumes:
    - "system catalog references from systemkatalog"
    - "consumer usage evidence from repository and GitHub caller scans"
    - "fleet tooling from wgx"
  produces:
    - "Fleet membership (fleet/repos.yml)"
    - "shared contracts (contracts/)"
    - "shared templates (templates/)"
    - "reusable CI workflows (.github/workflows/)"

contracts:
  role_contract:
    path: "system/metarepo-role.v1.json"
    note: "Normative scope and truth boundaries for this repository."
  schemas:
    - path: "contracts/*.schema.json"
      note: "Only contracts published by metarepo are canonical here."

dependencies:
  internal:
    - name: systemkatalog
      relationship: references
      interface: [system_purpose, system_relationships, entrypoints]
    - name: bureau
      relationship: delegates_truth
      interface: [tasks, queue, completion]
    - name: grabowski
      relationship: delegates_execution
      interface: [operator_execution, leases, audit, recovery]
    - name: wgx
      relationship: uses
      interface: [fleet_tooling, reusable_workflows]
  external:
    - name: github_actions

boundaries:
  not_responsible_for:
    - "ecosystem-wide system architecture or topology"
    - "task, queue, verification, or completion truth"
    - "operator execution, machine access, leases, audit, or recovery"
    - "runtime health of consumer systems"
    - "ecosystem event history"
    - "external protobuf APIs owned by contracts-mirror"
  dangerous_assumptions:
    - "Fleet membership equals membership in the complete operator ecosystem."
    - "Legacy organism documents describe the current architecture."
    - "A shared asset can be removed without proving all active consumers."
    - "Top-level repos.yml is normative; fleet/repos.yml is the authoritative source."

compatibility:
  non_authoritative_surfaces:
    - repos.yml
    - wgx/
    - servers/local-mcp/
  active_surface_requiring_consumer_migration:
    - .github/workflows/heimgewebe-command-dispatch.yml

conventions:
  branching: "main, feature/*"
  commit_prefix: "metarepo"
  ci_platform: github_actions

documentation:
  role_contract: system/metarepo-role.v1.json
  adr: docs/adrs/
  runbooks: docs/runbooks/

ai_guidance:
  do:
    - read system/metarepo-role.v1.json before planning changes
    - verify live consumers before changing contracts, templates, or reusable workflows
    - treat systemkatalog, bureau, and grabowski as separate truth owners
    - prefer workflow_call for reuse and pin external actions
  dont:
    - describe metarepo as a control plane
    - use legacy organism documents as current architecture truth
    - duplicate task or runtime status in metarepo
    - remove compatibility surfaces without migration evidence
