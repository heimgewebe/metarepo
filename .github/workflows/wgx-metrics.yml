---
# Canonical metrics validation workflow (reusable).
# Contract ownership: metarepo/contracts/metrics.snapshot.schema.json (ADR-0007).
# Consumer repos call this via workflow_call so they never need their own
# fetch/normalize/validate logic.

name: wgx metrics (reusable)

permissions:
  contents: read
concurrency:
  group: wgx-metrics-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

"on":
  workflow_call:
    inputs:
      post_url:
        description: >
          DEPRECATED non-secret endpoint input. Secret-backed callers must use
          the post_url workflow secret instead.
        required: false
        type: string
        default: ""
      schema_ref:
        description: >
          DEPRECATED – ignored. Use metarepo_ref instead.
          Kept for backward compatibility with existing callers.
        required: false
        type: string
        default: ""
      metarepo_ref:
        description: >
          Explicit metarepo ref (tag, branch, or SHA) used to fetch the
          canonical schema when running outside metarepo.  Consumers should
          set this to the same ref they pin the workflow to so that
          workflow logic and contract version stay in sync.
          Falls back to "main" when empty.
        required: false
        type: string
        default: ""
    secrets:
      post_url:
        description: >
          Optional secret-backed ingest endpoint URL for metrics snapshots.
        required: false
      post_token:
        description: >
          Optional secret-backed ingest token sent as X-Auth when posting
          metrics snapshots to authenticated ingest endpoints.
        required: false

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      METRICS_POST_URL: ${{ secrets.post_url || inputs.post_url }}
      METRICS_POST_TOKEN: ${{ secrets.post_token }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install tooling
        run: |
          set -euo pipefail

          # Agent-Mode: skip installs
          if [[ "${AGENT_MODE:-}" != "" ]]; then
            echo "Agent-Mode: skipping apt-get and npm installs"
            command -v jq >/dev/null 2>&1 || { echo "::error::jq not available in Agent-Mode"; exit 1; }
            command -v ajv >/dev/null 2>&1 || { echo "::error::ajv-cli not available in Agent-Mode"; exit 1; }
          else
            sudo apt-get update
            sudo apt-get install -y jq curl || true
            npm i -g ajv-cli@5
          fi

      - name: Run wgx metrics snapshot
        env:
          OUTPUT_PATH: metrics.json
        run: |
          set -euo pipefail
          if [ -x scripts/wgx-metrics-snapshot.sh ]; then
            bash scripts/wgx-metrics-snapshot.sh > "$OUTPUT_PATH"
          elif command -v just >/dev/null 2>&1; then
            if just --list > /tmp/just-list 2>&1 && grep -q "wgx metrics snapshot" /tmp/just-list; then
              just wgx metrics snapshot --json > "$OUTPUT_PATH"
            fi
          fi
          if [ ! -s "$OUTPUT_PATH" ]; then
            if command -v wgx >/dev/null 2>&1; then
              wgx metrics snapshot --json > "$OUTPUT_PATH"
            else
              echo "::error::No wgx metrics snapshot command available"
              exit 1
            fi
          fi
          jq . "$OUTPUT_PATH"

      - name: Fetch canonical metrics schema
        id: schema
        env:
          # Explicit metarepo ref provided by the caller.  Consumers should
          # set this to the same ref they pin the workflow to (tag / SHA)
          # so that workflow logic and contract version stay in sync.
          # Falls back to "main" when empty.
          METAREPO_REF: ${{ inputs.metarepo_ref }}
        run: |
          set -euo pipefail

          # Canonical schema: metarepo/contracts/metrics.snapshot.schema.json
          # Contract ownership stays in metarepo (ADR-0007).
          # When running inside metarepo the file is already present after
          # checkout.  Consumer repos fetch it from the explicitly provided
          # metarepo ref (or main as fallback).
          if [ -f contracts/metrics.snapshot.schema.json ]; then
            echo "Using local canonical schema"
            cp contracts/metrics.snapshot.schema.json metrics.schema.json
          elif [[ "${AGENT_MODE:-}" != "" ]]; then
            echo "::warning::Agent-Mode: canonical metrics schema not available locally, skipping validation"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            REF="${METAREPO_REF:-main}"
            SCHEMA_URL="https://raw.githubusercontent.com/heimgewebe/metarepo/${REF}/contracts/metrics.snapshot.schema.json"
            echo "Fetching canonical schema from $SCHEMA_URL (ref: ${REF})"
            curl -fsSL "$SCHEMA_URL" -o metrics.schema.json
          fi

      - name: Validate metrics payload
        if: steps.schema.outputs.skip != 'true'
        run: |
          set -euo pipefail
          # --spec=draft2020: canonical schema declares $schema 2020-12.
          # --strict=log: canonical schema uses x-producers/x-consumers
          #   metadata keywords – log them, do not reject.
          # The schema itself uses no 2020-12-only features, so these are
          # validator-compat flags, not a contract fork.
          ajv validate --spec=draft2020 --strict=log \
            -s metrics.schema.json -d metrics.json

      - name: Optional POST to ingest endpoint
        if: ${{ env.METRICS_POST_URL != '' && env.AGENT_MODE == '' }}
        env:
          POST_URL: ${{ env.METRICS_POST_URL }}
          POST_TOKEN: ${{ env.METRICS_POST_TOKEN }}
        run: |
          set -euo pipefail
          echo "POSTing metrics snapshot to configured ingest endpoint"
          args=(-fsS -H "Content-Type: application/json" --data-binary @metrics.json)
          if [[ -n "${POST_TOKEN:-}" ]]; then
            args+=(-H "X-Auth: ${POST_TOKEN}")
          fi
          curl "${args[@]}" "$POST_URL"

      - name: Skip POST to ingest (Agent-Mode)
        if: ${{ env.METRICS_POST_URL != '' && env.AGENT_MODE != '' }}
        run: |
          echo "Agent-Mode: skipping external POST to ingest endpoint"
