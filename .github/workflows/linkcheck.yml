---
name: linkcheck
permissions:
  contents: read

"on":
  push:
    branches: [main]
    paths:
      - README.md
      - docs/**
      - contracts/**/*.md
      - .lychee.toml
      - .github/workflows/linkcheck.yml
  pull_request:
    paths:
      - README.md
      - docs/**
      - contracts/**/*.md
      - .lychee.toml
      - .github/workflows/linkcheck.yml
defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}
concurrency:
  group: linkcheck-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lychee:
    name: Link Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Cache lychee URL state
        uses: actions/cache@v6  # v6 (major tag)
        with:
          path: ~/.cache/lychee
          key: ${{ runner.os }}-lychee-${{ hashFiles('.lychee.toml', 'README.md', 'docs/**/*.md', 'contracts/**/*.md') }}
          restore-keys: |
            ${{ runner.os }}-lychee-

      - name: Run lychee on docs and README
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8  # v2.9.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LYCHEE_CACHE_DIR: ~/.cache/lychee
        with:
          args: --config .lychee.toml README.md 'docs/**/*.md' 'contracts/**/*.md'
          fail: true
