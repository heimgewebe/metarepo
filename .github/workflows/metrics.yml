---
# Repo-local metrics workflow for metarepo itself.
# Uses the same canonical validation logic as the reusable
# wgx-metrics.yml so the two cannot drift apart.
# Canonical schema: contracts/metrics.snapshot.schema.json (ADR-0007).

name: "📊 Metrics Snapshot & Validation"
permissions:
  contents: read          # Repo lesen, um Skripte auszuführen
  actions: write          # notwendig für upload-artifact
  checks: write
'on':
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

env:
  HAUSKI_POST_URL: ${{ secrets.HAUSKI_METRICS_URL }}

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Ensure Node for ajv-cli
        uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: Snapshot metrics
        run: bash scripts/wgx-metrics-snapshot.sh --json

      - name: Validate metrics contract
        run: |
          # Canonical schema from metarepo/contracts/ (ADR-0007).
          # This workflow runs inside metarepo, so the schema is always
          # local after checkout – no fetch needed.
          # --spec=draft2020: canonical schema declares $schema 2020-12.
          # --strict=log: canonical schema uses x-producers/x-consumers
          #   metadata keywords – log them, do not reject.
          npx --yes ajv-cli@5 validate --spec=draft2020 --strict=log \
            -s contracts/metrics.snapshot.schema.json \
            -d metrics.json

      - name: Optional POST to hausKI
        if: ${{ env.HAUSKI_POST_URL && env.HAUSKI_POST_URL != '' && env.AGENT_MODE == '' }}
        run: |
          curl --fail --silent --show-error --retry 3 --retry-delay 2 \
            -H 'Content-Type: application/json' \
            --data @metrics.json \
            "$HAUSKI_POST_URL"
        continue-on-error: true

      - name: Skip POST to hausKI (Agent-Mode)
        if: ${{ env.HAUSKI_POST_URL && env.HAUSKI_POST_URL != '' && env.AGENT_MODE != '' }}
        run: |
          echo "Agent-Mode: skipping external POST to hausKI"

      - name: Upload metrics.json artifact
        uses: actions/upload-artifact@v6
        with:
          name: metrics-snapshot
          path: metrics.json
          retention-days: 7
