---
name: metarepo-role-guard

"on":
  pull_request:
    paths:
      - "README.md"
      - "AGENTS.md"
      - ".ai-context.yml"
      - "system/metarepo-role.v1.json"
      - "tests/test_metarepo_role_contract.py"
      - ".github/workflows/metarepo-role-guard.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "README.md"
      - "AGENTS.md"
      - ".ai-context.yml"
      - "system/metarepo-role.v1.json"
      - "tests/test_metarepo_role_contract.py"
      - ".github/workflows/metarepo-role-guard.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: metarepo-role-guard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  role-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7

      - name: Sync locked environment
        run: uv sync --frozen

      - name: Verify role contract and entrypoints
        run: uv run pytest -q tests/test_metarepo_role_contract.py
